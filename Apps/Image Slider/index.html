<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <link rel="stylesheet" href="image slider.css">
</head>
<body>
    <div class="slider">
        <div class="slides">
            <img class="slide" src="images/1680x756-7.jpg">
            <img class="slide" src="images/bugatti-centodieci.jpg">
            <img class="slide" src="images/cr-2024081866c184b878237.jpg">
            <img class="slide" src="images/most-expensive-cars-in-the-world.webp">
            <img class="slide" src="images/park.jpg">
            <img class="slide" src="images/8829c0e55f0522cea7b589fec420db88.avif">
            <img class="slide" src="images/blue-car-flat-style-illustration-isolated-white-background_108231-795.avif">
        </div>
        <button class="prev" onclick="prevslide()">&#10094</button>
        <button class="next" onclick="nextslide()">&#10095</button>
    </div>
    <script src="image slider.js"></script>
</body>
</html>
